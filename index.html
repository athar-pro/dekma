<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enter if you dare</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: black;
            color: red;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden; /* Stop scrolling */
            text-align: center;
        }

        /* --- LANDING PAGE STYLES --- */
        #landing-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100%;
            cursor: pointer; /* Indicates it's clickable */
            z-index: 10;
        }

        h1 { font-size: 2rem; margin-bottom: 10px; }
        p { font-size: 1.2rem; margin-top: 5px; }

        .image-container {
            position: relative;
            display: inline-block;
            margin-top: 20px;
            border: 2px solid red;
        }

        .image-container img {
            max-width: 300px;
            display: block;
        }

        .image-text {
            position: absolute;
            bottom: 10px;
            left: 0;
            width: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 5px 0;
            font-weight: bold;
        }

        /* --- PRANK SCREEN STYLES --- */
        #prank-screen {
            display: none; /* Hidden by default */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://files.catbox.moe/18awhp.jpg');
            background-size: cover;
            background-position: center;
            z-index: 20;
        }

        /* The flashing animation for the background */
        .flashing-bg {
            animation: blink 0.1s infinite alternate;
        }

        @keyframes blink {
            0% { filter: invert(0%) brightness(1); }
            50% { filter: invert(100%) brightness(2); }
            100% { filter: brightness(5) sepia(1); }
        }

        /* Center the video */
        #video-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 5px solid white;
            z-index: 30;
        }

        video {
            width: 300px;
            height: auto;
        }

        /* Strobe light white overlay */
        #white-flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 40;
            animation: strobe 0.15s infinite;
        }

        @keyframes strobe {
            0% { opacity: 0; }
            50% { opacity: 0.8; }
            100% { opacity: 0; }
        }

    </style>
</head>
<body>

    <div id="landing-screen" onclick="startPrank()">
        <h1>ENTER</h1>
        <p>do not going to website for kids</p>
        <p>website is sus for u an 18+</p>
        
        <div class="image-container">
            <img src="https://files.catbox.moe/0ubyxh.jpg" alt="Johnny Test">
            <div class="image-text">i am ber hug in this not when you kids</div>
        </div>
        
        <p style="margin-top:20px; font-size: 0.8rem;">(Click anywhere to enter)</p>
    </div>

    <div id="prank-screen">
        <div id="white-flash"></div> <div id="video-container">
            <video id="fart-video" loop>
                <source src="https://files.catbox.moe/tej7cn.mp4" type="video/mp4">
            </video>
        </div>
    </div>

    <audio id="sound1" loop>
        <source src="https://files.catbox.moe/jue6gl.mp3" type="audio/mpeg">
    </audio>
    <audio id="sound2" loop>
        <source src="https://files.catbox.moe/tqzxpb.mp3" type="audio/mpeg">
    </audio>
    <audio id="sound3" loop>
        <source src="https://files.catbox.moe/0slayo.mp3" type="audio/mpeg">
    </audio>

    <script>
        function startPrank() {
            // 1. Hide Landing, Show Prank
            document.getElementById('landing-screen').style.display = 'none';
            const prankScreen = document.getElementById('prank-screen');
            prankScreen.style.display = 'block';
            
            // 2. Add flashing class to background
            prankScreen.classList.add('flashing-bg');

            // 3. Play Video
            const video = document.getElementById('fart-video');
            video.play();

            // 4. Play Audio (Browsers require interaction first, which the click provided)
            const s1 = document.getElementById('sound1');
            const s2 = document.getElementById('sound2');
            const s3 = document.getElementById('sound3'); // Select new audio
            
            s1.volume = 1.0; // Max volume
            s2.volume = 1.0;
            s3.volume = 1.0; // Max volume for new audio
            
            s1.play();
            s2.play();
            s3.play(); // Play new audio

            // 5. Handle Cursor Behavior
            // Hide cursor immediately
            document.body.style.cursor = 'none';
            prankScreen.style.cursor = 'none';

            // Bring cursor back after 3 seconds, but keeping the chaos
            setTimeout(() => {
                document.body.style.cursor = 'none';
                prankScreen.style.cursor = 'none'; 
            }, 3000);

            // Optional: Enter fullscreen for better effect
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            }
        }
    </script>
</body>
</html>
